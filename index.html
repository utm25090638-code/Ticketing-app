<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ticketing App PRO</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<style>
body { font-family: Arial; text-align: center; background: #0f172a; color: white; }
input, button { padding: 10px; margin: 5px; border-radius: 8px; border: none; }
button { background: #22c55e; color: white; cursor: pointer; }
.container { margin-top: 20px; }
.card { background: #1e293b; padding: 15px; border-radius: 12px; margin-top: 15px; }
</style>
</head>
<body>

<h1>🎟️ Ticketing App</h1>

<div class="container">
  <h3>Generar Ticket</h3>
  <input type="text" id="name" placeholder="Tu nombre">
  <button onclick="generarTicket()">Crear Ticket</button>

  <div class="card">
    <p id="ticketInfo"></p>
    <canvas id="qr"></canvas>
  </div>
</div>

<div class="container">
  <h3>Verificar Ticket</h3>
  <input type="text" id="ticketInput" placeholder="Ingresa ID del ticket">
  <button onclick="verificarTicket()">Verificar</button>

  <div class="card">
    <p id="resultado"></p>
  </div>
</div>

<script>
// Base de datos simulada
let tickets = JSON.parse(localStorage.getItem("tickets")) || [];

function generarTicket() {
  const name = document.getElementById("name").value;
  if (!name) return alert("Escribe tu nombre");

  const ticketId = "TICKET-" + Date.now();

  const ticket = { nombre: name, id: ticketId, usado: false };

  tickets.push(ticket);
  localStorage.setItem("tickets", JSON.stringify(tickets));

  document.getElementById("ticketInfo").innerText =
    `Nombre: ${name} | ID: ${ticketId}`;

  QRCode.toCanvas(document.getElementById("qr"), ticketId);
}

function verificarTicket() {
  const id = document.getElementById("ticketInput").value;

  const ticket = tickets.find(t => t.id === id);

  if (!ticket) {
    document.getElementById("resultado").innerText = "❌ Ticket inválido";
    return;
  }

  if (ticket.usado) {
    document.getElementById("resultado").innerText = "⚠️ Ticket ya usado";
    return;
  }

  ticket.usado = true;
  localStorage.setItem("tickets", JSON.stringify(tickets));

  document.getElementById("resultado").innerText =
    `✅ Acceso permitido: ${ticket.nombre}`;
}
</script>

</body>
</html>
